<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // SEGURIDAD: Si no hay usuario logueado, redirigir al Login (index.html)
        if (!localStorage.getItem('user')) {
            window.location.href = 'index.html';
        }
    </script>
    <style>
        .dark { background-color: #111827 !important; color: white !important; }
        .dark .bg-white { background-color: #1f2937 !important; color: white !important; }
        .dark h2 { color: white !important; }
        .dark .bg-gray-200 { background-color: #374151 !important; color: white !important; }
        .dark .border { border-color: #4b5563 !important; }
    </style>
</head>
<body id="mainBody" class="bg-gray-100 p-8 transition-colors duration-300">
    
    <div id="mainPanel" class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-lg">
        
        <button id="toggleMode" class="mb-6 flex items-center gap-2 bg-yellow-400 hover:bg-yellow-500 text-black font-bold py-2 px-6 rounded-full shadow-md transition-all duration-300 transform hover:scale-105 active:scale-95">
            <span>☀️ / 🌙</span>
            <span>Cambiar Fondo</span>
        </button>

        <h2 class="text-2xl font-semibold text-gray-700 mb-4">Lista de Mods</h2>
        <button id="btnLogout" class="flex items-center gap-2 bg-gradient-to-r from-red-500 to-red-600 text-white px-6 py-2.5 rounded-full shadow-md hover:shadow-lg transition-all">
            <span>Cerrar Sesión</span>
        </button>
    </div>

    <script>
        // Lógica de Logout: limpia sesión y regresa al inicio (index.html)
        document.getElementById('btnLogout').onclick = () => {
            localStorage.clear();
            window.location.href = 'index.html';
        };

        // Lógica de Modo Oscuro
        const btn = document.getElementById('toggleMode');
        const body = document.getElementById('mainBody');
        const panel = document.getElementById('mainPanel');

        const applyMode = (isDark) => {
            if (isDark) {
                body.classList.add('dark');
                panel.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark');
                panel.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }
        };

        if (localStorage.getItem('theme') === 'dark') applyMode(true);

        btn.onclick = () => {
            const isDark = body.classList.contains('dark');
            applyMode(!isDark);
        };
    </script>
</body>
</html>
