<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen text-white">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">Registro</h2>
        <input id="user" class="w-full p-2 mb-4 bg-gray-700 rounded" placeholder="Usuario">
        <input id="pass" type="password" class="w-full p-2 mb-4 bg-gray-700 rounded" placeholder="Contraseña">
        <button id="btnRegistro" class="w-full bg-blue-600 p-2 rounded hover:bg-blue-700">Registrarse</button>
        <p class="mt-4 text-center text-sm">¿Ya tienes cuenta? <a href="login.html" class="text-blue-400">Inicia sesión</a></p>
    </div>

    <script>
        document.getElementById('btnRegistro').onclick = () => {
            localStorage.setItem('user', document.getElementById('user').value);
            localStorage.setItem('pass', document.getElementById('pass').value);
            alert('¡Usuario registrado!');
            window.location.href = 'login.html';
        };
    </script>
</body>
</html>
